<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 С Днём Влюблённых!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(45deg, rgba(255,64,129,0.2), rgba(147,41,129,0.2)),
                        url('back1.jpg') center/cover fixed;
            animation: gradientShift 10s infinite alternate;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Marck Script', cursive;
            overflow: hidden;
            perspective: 1000px;
        }

        .parallax {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('back1.jpg') center/cover fixed;
            z-index: -1;
            transform: translateZ(-1px) scale(2);
        }

        .photo-grid {
            position: absolute;
            top: 15%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
            max-width: 1200px;
            width: 90%;
            z-index: 1;
        }

        .photo-tile {
            width: 100%;
            height: 150px;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border: 3px solid white;
        }

        .photo-tile:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 30px rgba(255,64,129,0.5);
        }

        .photo-tile img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .heart-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: #ff4081;
            animation: fall linear infinite;
            opacity: 0;
            font-size: 32px;
            will-change: transform, opacity;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20vh) translateX(-5vw) scale(0.8);
                opacity: 0;
            }
            20% {
                transform: translateY(-10vh) translateX(5vw) scale(1);
                opacity: 1;
            }
            80% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(110vh) translateX(5vw) scale(1.2);
                opacity: 0;
            }
        }

        .button-container {
            position: relative;
            z-index: 2;
            margin-top: 200px;
        }

        .magic-button {
            padding: 15px 30px;
            font-size: 24px;
            color: #fff;
            background: linear-gradient(135deg, #ff6b6b, #ff4081);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 25px #ff4081;
            animation: pulse 2s infinite;
            font-family: 'Dancing Script', cursive;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .magic-button:hover {
            transform: scale(1.1) rotate(3deg);
            box-shadow: 0 0 40px #ff4081;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .firework {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff4081;
            border-radius: 50%;
            animation: explode 1s ease-out;
        }

        @keyframes explode {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(10); opacity: 0; }
        }

        @media (min-width: 1024px) {
            .photo-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 25px;
            }

            .photo-tile {
                height: 250px;
            }

            .button-container {
                margin-top: 400px;
            }

            .heart {
                font-size: 48px;
            }

            .magic-button {
                padding: 20px 45px;
                font-size: 28px;
            }
        }

        @media (max-width: 390px) {
    .photo-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        padding: 10px;
    }

    .photo-tile {
        height: 120px;
    }

    .magic-button {
        padding: 12px 25px;
        font-size: 20px;
    }

    .button-container {
        margin-top: 200px;
    }

    .heart {
        font-size: 24px;
    }
}
    </style>
</head>
<body>
    <div class="parallax"></div>
    
    <div class="photo-grid">
        <div class="photo-tile">
            <img src="photo1.jpg" alt="Наше фото 1">
        </div>
        <div class="photo-tile">
            <img src="photo2.jpg" alt="Наше фото 2">
        </div>
        <div class="photo-tile">
            <img src="photo3.jpg" alt="Наше фото 3">
        </div>
        <div class="photo-tile">
            <img src="photo4.jpg" alt="Наше фото 4">
        </div>
    </div>

    <div class="heart-container" id="hearts"></div>
    <div class="button-container">
        <button class="magic-button" onclick="createFireworks()">
            Нажми 💌
        </button>
    </div>

    <script>
         function createHearts() {
    const heartContainer = document.getElementById('hearts');
    const heartCount = 100;
    
    const fragment = document.createDocumentFragment();
    
    for (let i = 0; i < heartCount; i++) {
        const heart = document.createElement('div');
        heart.innerHTML = '❤';
        heart.className = 'heart';
        
        const delay = Math.random() * 5;
        const duration = 6 + Math.random() * 4;
        const startX = Math.random() * 100;
        
        heart.style.cssText = `
            left: ${startX}%;
            animation-delay: ${delay}s;
            animation-duration: ${duration}s;
        `;
        
        fragment.appendChild(heart);
    }
    
    heartContainer.appendChild(fragment);
}
        createHearts();

        function createFireworks() {
            for (let i = 0; i < 0; i++) {
                const firework = document.createElement('div');
                firework.className = 'firework';
                firework.style.left = Math.random() * 100 + '%';
                firework.style.top = Math.random() * 100 + '%';
                firework.style.animationDelay = Math.random() * 0.5 + 's';
                document.body.appendChild(firework);
                setTimeout(() => firework.remove(), 1000);
            }
            setTimeout(() => window.location.href = 'message.html', 500);
        }

        document.addEventListener('mousemove', (e) => {
            const parallax = document.querySelector('.parallax');
            const x = (window.innerWidth - e.pageX) / 20;
            const y = (window.innerHeight - e.pageY) / 20;
            parallax.style.transform = `translateX(${x}px) translateY(${y}px) translateZ(-1px) scale(2)`;
        });
    </script>
</body>
</html>
